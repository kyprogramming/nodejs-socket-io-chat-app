<!DOCTYPE html>
<html lang="en">

<head>
    <title>Nexus Chat — Login</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <link href="./css/login-style.css" rel="stylesheet" />
</head>

<body>

    <div class="card">
        <div class="card-top"></div>

        <div class="card-header">
            <div class="logo-wrap">
                <div class="logo">
                    <svg width="26" height="26" fill="none" stroke="white" stroke-width="1.8" viewBox="0 0 24 24">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                </div>
                <div class="logo-ring"></div>
            </div>
            <div class="card-title">Welcome back</div>
            <div class="card-sub">Sign in to your Nexus Chat account</div>
        </div>

        <div class="card-body">

            <!-- Alert -->
            <div class="alert" id="alert">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
                <span id="alert-text"></span>
            </div>

            <form id="login-form" novalidate>

                <!-- Username -->
                <div class="field-group">
                    <label for="username">Username</label>
                    <div class="input-wrap">
                        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />
                        <svg class="input-icon" width="16" height="16" fill="none" stroke="currentColor"
                            stroke-width="2" viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                    <div class="field-error" id="username-error"></div>
                </div>

                <!-- Password -->
                <div class="field-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" placeholder="Enter your password"
                            autocomplete="current-password" />
                        <svg class="input-icon" width="16" height="16" fill="none" stroke="currentColor"
                            stroke-width="2" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        <button type="button" class="pw-toggle" onclick="togglePw('password', this)" tabindex="-1">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                    <div class="field-error" id="password-error"></div>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">
                    <div class="spinner"></div>
                    <span class="btn-text">Sign In</span>
                </button>
            </form>

            <div class="divider"><span>or</span></div>

        </div>

        <div class="card-footer">
            <p class="footer-text">
                Don't have an account?
                <a href="/register.html" class="footer-link">Create one →</a>
            </p>
        </div>

        <div class="powered">nexus chat · secure · realtime</div>
    </div>

    <script>
        const form = document.getElementById("login-form");
        const alertEl = document.getElementById("alert");
        const alertText = document.getElementById("alert-text");
        const submitBtn = document.getElementById("submit-btn");

        function showAlert(msg, type = "error") {
            alertEl.className = `alert show ${type}`;
            alertText.textContent = msg;
        }
        function clearAlert() { alertEl.className = "alert"; }

        function fieldError(id, msg) {
            const input = document.getElementById(id);
            const err = document.getElementById(`${id}-error`);
            input.classList.add("error");
            if (err) { err.textContent = msg; err.classList.add("show"); }
        }
        function clearField(id) {
            const input = document.getElementById(id);
            const err = document.getElementById(`${id}-error`);
            input.classList.remove("error");
            if (err) err.classList.remove("show");
        }

        function setLoading(on) {
            submitBtn.disabled = on;
            submitBtn.classList.toggle("loading", on);
        }

        function togglePw(id, btn) {
            const input = document.getElementById(id);
            const isText = input.type === "text";
            input.type = isText ? "password" : "text";
            btn.style.color = isText ? "" : "var(--primary)";
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            clearAlert();
            clearField("username");
            clearField("password");

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;

            let valid = true;
            if (!username) { fieldError("username", "Username is required."); valid = false; }
            if (!password) { fieldError("password", "Password is required."); valid = false; }
            if (!valid) return;

            setLoading(true);
            try {
                const res = await fetch("/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();

                if (!res.ok) {
                    showAlert(data.message || "Login failed.");
                    return;
                }

                // store token and redirect
                localStorage.setItem("token", data.token);
                localStorage.setItem("user", JSON.stringify(data.user));
                showAlert("Login successful! Redirecting…", "success");
                setTimeout(() => window.location.href = "/", 900);

            } catch (err) {
                showAlert("Network error. Please try again.");
            } finally {
                setLoading(false);
            }
        });

        // clear error on type
        ["username", "password"].forEach(id => {
            document.getElementById(id).addEventListener("input", () => clearField(id));
        });
    </script>
</body>

</html>
