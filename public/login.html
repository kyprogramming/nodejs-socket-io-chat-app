<!DOCTYPE html>
<html lang="en">

<head>
    <title>Nexus Chat — Login</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --primary: #635bff;
            --primary-dark: #4a44d1;
            --primary-glow: rgba(99, 91, 255, 0.25);
            --primary-bg: rgba(99, 91, 255, 0.07);
            --gradient: linear-gradient(135deg, #635bff 0%, #8b5cf6 50%, #d946ef 100%);
            --gradient-soft: linear-gradient(135deg, rgba(99, 91, 255, 0.10) 0%, rgba(217, 70, 239, 0.07) 100%);
            --surface: rgba(255, 255, 255, 0.88);
            --surface-solid: #ffffff;
            --surface-2: rgba(248, 248, 252, 0.95);
            --border: rgba(99, 91, 255, 0.13);
            --border-2: rgba(99, 91, 255, 0.24);
            --text: #0f0e1a;
            --text-2: #5b5675;
            --text-3: #9b96b8;
            --error: #f43f5e;
            --error-bg: rgba(244, 63, 94, 0.08);
            --success: #10b981;
            --shadow-lg: 0 8px 40px rgba(99, 91, 255, 0.16), 0 2px 8px rgba(99, 91, 255, 0.08);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-color: #eef2ff;
            background-image:
                radial-gradient(ellipse 70% 60% at 15% 85%, rgba(99, 91, 255, 0.18) 0%, transparent 55%),
                radial-gradient(ellipse 60% 50% at 85% 10%, rgba(217, 70, 239, 0.13) 0%, transparent 50%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(139, 92, 246, 0.07) 0%, transparent 60%);
            overflow: hidden;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: blobFloat 12s ease-in-out infinite alternate;
            pointer-events: none;
        }

        body::before {
            width: 500px;
            height: 500px;
            top: -100px;
            left: -100px;
            background: radial-gradient(circle, rgba(99, 91, 255, 0.15), transparent 70%);
        }

        body::after {
            width: 400px;
            height: 400px;
            bottom: -80px;
            right: -80px;
            background: radial-gradient(circle, rgba(217, 70, 239, 0.12), transparent 70%);
            animation-delay: -6s;
        }

        @keyframes blobFloat {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(30px, 20px) scale(1.05);
            }
        }

        /* ── Card ──────────────────────────────────────────── */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.75);
            border-radius: 24px;
            box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            overflow: hidden;
            animation: cardIn 0.5s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(28px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── Top gradient strip ────────────────────────────── */
        .card-top {
            height: 5px;
            background: var(--gradient);
        }

        /* ── Header ────────────────────────────────────────── */
        .card-header {
            padding: 36px 36px 28px;
            text-align: center;
            background: var(--gradient-soft);
            border-bottom: 1px solid var(--border);
        }

        .logo-wrap {
            display: inline-flex;
            position: relative;
            margin-bottom: 18px;
        }

        .logo {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px var(--primary-glow);
        }

        .logo-ring {
            position: absolute;
            inset: -4px;
            border-radius: 20px;
            border: 2px solid transparent;
            background: var(--gradient) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            opacity: 0.35;
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.4px;
            margin-bottom: 6px;
        }

        .card-sub {
            font-size: 13.5px;
            color: var(--text-3);
            font-weight: 400;
        }

        /* ── Body ──────────────────────────────────────────── */
        .card-body {
            padding: 28px 36px 32px;
        }

        .field-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            pointer-events: none;
            transition: color 0.2s;
        }

        input {
            width: 100%;
            background: var(--surface-2);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px 12px 42px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: all 0.2s;
        }

        input::placeholder {
            color: var(--text-3);
        }

        input:focus {
            border-color: var(--primary);
            background: var(--surface-solid);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        input:focus+.input-icon,
        .input-wrap:focus-within .input-icon {
            color: var(--primary);
        }

        input.error {
            border-color: var(--error);
            box-shadow: 0 0 0 3px var(--error-bg);
        }

        .field-error {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--error);
            margin-top: 6px;
            display: none;
            padding-left: 4px;
        }

        .field-error.show {
            display: block;
        }

        /* password toggle */
        .pw-toggle {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-3);
            padding: 4px;
            display: flex;
            transition: color 0.2s;
        }

        .pw-toggle:hover {
            color: var(--primary);
        }

        /* ── Alert box ─────────────────────────────────────── */
        .alert {
            border-radius: 10px;
            padding: 11px 14px;
            font-size: 13px;
            margin-bottom: 18px;
            display: none;
            align-items: center;
            gap: 8px;
            animation: alertIn 0.25s ease;
        }

        @keyframes alertIn {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.show {
            display: flex;
        }

        .alert.error {
            background: var(--error-bg);
            border: 1px solid rgba(244, 63, 94, 0.2);
            color: var(--error);
        }

        .alert.success {
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        /* ── Submit button ─────────────────────────────────── */
        .btn-submit {
            width: 100%;
            background: var(--gradient);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s;
            box-shadow: 0 4px 16px var(--primary-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 6px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--primary-glow);
            filter: brightness(1.07);
        }

        .btn-submit:active {
            transform: translateY(0);
            filter: brightness(0.97);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-submit.loading .spinner {
            display: block;
        }

        .btn-submit.loading .btn-text {
            opacity: 0.7;
        }

        /* ── Divider ───────────────────────────────────────── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-3);
        }

        /* ── Footer link ───────────────────────────────────── */
        .card-footer {
            text-align: center;
            padding: 0 36px 28px;
        }

        .footer-text {
            font-size: 13.5px;
            color: var(--text-3);
        }

        .footer-link {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        /* ── Powered by tag ────────────────────────────────── */
        .powered {
            position: absolute;
            bottom: -32px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: rgba(99, 91, 255, 0.4);
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="card-top"></div>

        <div class="card-header">
            <div class="logo-wrap">
                <div class="logo">
                    <svg width="26" height="26" fill="none" stroke="white" stroke-width="1.8" viewBox="0 0 24 24">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                </div>
                <div class="logo-ring"></div>
            </div>
            <div class="card-title">Welcome back</div>
            <div class="card-sub">Sign in to your Nexus Chat account</div>
        </div>

        <div class="card-body">

            <!-- Alert -->
            <div class="alert" id="alert">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
                <span id="alert-text"></span>
            </div>

            <form id="login-form" novalidate>

                <!-- Username -->
                <div class="field-group">
                    <label for="username">Username</label>
                    <div class="input-wrap">
                        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />
                        <svg class="input-icon" width="16" height="16" fill="none" stroke="currentColor"
                            stroke-width="2" viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                    <div class="field-error" id="username-error"></div>
                </div>

                <!-- Password -->
                <div class="field-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" placeholder="Enter your password"
                            autocomplete="current-password" />
                        <svg class="input-icon" width="16" height="16" fill="none" stroke="currentColor"
                            stroke-width="2" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        <button type="button" class="pw-toggle" onclick="togglePw('password', this)" tabindex="-1">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                    <div class="field-error" id="password-error"></div>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">
                    <div class="spinner"></div>
                    <span class="btn-text">Sign In</span>
                </button>
            </form>

            <div class="divider"><span>or</span></div>

        </div>

        <div class="card-footer">
            <p class="footer-text">
                Don't have an account?
                <a href="/register.html" class="footer-link">Create one →</a>
            </p>
        </div>

        <div class="powered">nexus chat · secure · realtime</div>
    </div>

    <script>
        const form = document.getElementById("login-form");
        const alertEl = document.getElementById("alert");
        const alertText = document.getElementById("alert-text");
        const submitBtn = document.getElementById("submit-btn");

        function showAlert(msg, type = "error") {
            alertEl.className = `alert show ${type}`;
            alertText.textContent = msg;
        }
        function clearAlert() { alertEl.className = "alert"; }

        function fieldError(id, msg) {
            const input = document.getElementById(id);
            const err = document.getElementById(`${id}-error`);
            input.classList.add("error");
            if (err) { err.textContent = msg; err.classList.add("show"); }
        }
        function clearField(id) {
            const input = document.getElementById(id);
            const err = document.getElementById(`${id}-error`);
            input.classList.remove("error");
            if (err) err.classList.remove("show");
        }

        function setLoading(on) {
            submitBtn.disabled = on;
            submitBtn.classList.toggle("loading", on);
        }

        function togglePw(id, btn) {
            const input = document.getElementById(id);
            const isText = input.type === "text";
            input.type = isText ? "password" : "text";
            btn.style.color = isText ? "" : "var(--primary)";
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            clearAlert();
            clearField("username");
            clearField("password");

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;

            let valid = true;
            if (!username) { fieldError("username", "Username is required."); valid = false; }
            if (!password) { fieldError("password", "Password is required."); valid = false; }
            if (!valid) return;

            setLoading(true);
            try {
                const res = await fetch("/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();

                if (!res.ok) {
                    showAlert(data.message || "Login failed.");
                    return;
                }

                // store token and redirect
                localStorage.setItem("token", data.token);
                localStorage.setItem("user", JSON.stringify(data.user));
                showAlert("Login successful! Redirecting…", "success");
                setTimeout(() => window.location.href = "/", 900);

            } catch (err) {
                showAlert("Network error. Please try again.");
            } finally {
                setLoading(false);
            }
        });

        // clear error on type
        ["username", "password"].forEach(id => {
            document.getElementById(id).addEventListener("input", () => clearField(id));
        });
    </script>
</body>

</html>
