<!DOCTYPE html>
<html lang="en">

<head>
    <title>Nexus Chat</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg-1: #eef2ff;
            --bg-2: #fdf4ff;
            --bg-3: #fff7ed;
            --surface: rgba(255, 255, 255, 0.82);
            --surface-solid: #ffffff;
            --surface-2: rgba(248, 248, 252, 0.9);
            --surface-3: rgba(241, 241, 248, 0.8);
            --border: rgba(99, 91, 255, 0.12);
            --border-2: rgba(99, 91, 255, 0.22);
            --text: #0f0e1a;
            --text-2: #5b5675;
            --text-3: #9b96b8;
            --primary: #635bff;
            --primary-dark: #4a44d1;
            --primary-glow: rgba(99, 91, 255, 0.25);
            --primary-bg: rgba(99, 91, 255, 0.07);
            --gradient: linear-gradient(135deg, #635bff 0%, #8b5cf6 50%, #d946ef 100%);
            --gradient-soft: linear-gradient(135deg, rgba(99, 91, 255, 0.12) 0%, rgba(217, 70, 239, 0.08) 100%);
            --me-bg: linear-gradient(135deg, #635bff 0%, #8b5cf6 100%);
            --shadow-sm: 0 1px 3px rgba(99, 91, 255, 0.08), 0 4px 12px rgba(99, 91, 255, 0.06);
            --shadow-md: 0 4px 16px rgba(99, 91, 255, 0.12), 0 8px 32px rgba(99, 91, 255, 0.06);
            --shadow-lg: 0 8px 40px rgba(99, 91, 255, 0.16), 0 2px 8px rgba(99, 91, 255, 0.08);
            --radius: 20px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-color: #eef2ff;
            background-image:
                radial-gradient(ellipse 70% 60% at 15% 85%, rgba(99, 91, 255, 0.18) 0%, transparent 55%),
                radial-gradient(ellipse 60% 50% at 85% 10%, rgba(217, 70, 239, 0.13) 0%, transparent 50%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(139, 92, 246, 0.07) 0%, transparent 60%);
            overflow: hidden;
        }

        /* floating blobs */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: blobFloat 12s ease-in-out infinite alternate;
            pointer-events: none;
        }

        body::before {
            width: 500px;
            height: 500px;
            top: -100px;
            left: -100px;
            background: radial-gradient(circle, rgba(99, 91, 255, 0.15), transparent 70%);
        }

        body::after {
            width: 400px;
            height: 400px;
            bottom: -80px;
            right: -80px;
            background: radial-gradient(circle, rgba(217, 70, 239, 0.12), transparent 70%);
            animation-delay: -6s;
        }

        @keyframes blobFloat {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(30px, 20px) scale(1.05);
            }
        }

        /* ── Shell ─────────────────────────────────────────── */
        .shell {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
            height: 92vh;
            max-height: 820px;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            overflow: hidden;
            animation: shellIn 0.5s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }

        @keyframes shellIn {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── Header ────────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            background: var(--surface-solid);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 24px;
            right: 24px;
            height: 1px;
            background: var(--gradient);
            opacity: 0.3;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 13px;
        }

        .logo-wrap {
            position: relative;
            width: 42px;
            height: 42px;
            flex-shrink: 0;
        }

        .logo {
            width: 42px;
            height: 42px;
            border-radius: 13px;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px var(--primary-glow);
        }

        .logo-ring {
            position: absolute;
            inset: -3px;
            border-radius: 16px;
            border: 2px solid transparent;
            background: var(--gradient) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            opacity: 0.4;
        }

        .app-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .app-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10.5px;
            color: var(--text-3);
            margin-top: 1px;
            transition: color 0.3s;
        }

        .app-sub.active {
            color: var(--primary);
        }

        .conn-badge {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 12px;
            border-radius: 100px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            backdrop-filter: blur(8px);
        }

        .conn-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-3);
            transition: all 0.4s;
        }

        .conn-dot.live {
            background: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
            }

            50% {
                box-shadow: 0 0 0 5px rgba(16, 185, 129, 0.08);
            }
        }

        .conn-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10.5px;
            color: var(--text-3);
            transition: color 0.3s;
        }

        .conn-text.live {
            color: #10b981;
        }

        /* ── Join Panel ─────────────────────────────────────── */
        .join-panel {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--gradient-soft);
            flex-shrink: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .join-panel.gone {
            height: 0 !important;
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
            pointer-events: none;
            border: none;
        }

        .join-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10.5px;
            color: var(--text-3);
            margin-bottom: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .join-row {
            display: flex;
            gap: 8px;
        }

        .field {
            flex: 1;
            background: var(--surface-solid);
            border: 1.5px solid var(--border);
            border-radius: 11px;
            padding: 10px 14px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13.5px;
            font-weight: 400;
            color: var(--text);
            outline: none;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .field::placeholder {
            color: var(--text-3);
        }

        .field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow), var(--shadow-sm);
        }

        .field.shake {
            animation: shake 0.35s ease;
            border-color: #f43f5e;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-5px);
            }

            40%,
            80% {
                transform: translateX(5px);
            }
        }

        .field-sm {
            width: 95px;
            flex: none;
        }

        .btn-join {
            background: var(--gradient);
            color: #fff;
            border: none;
            border-radius: 11px;
            padding: 10px 20px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13.5px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.18s;
            box-shadow: 0 4px 14px var(--primary-glow);
        }

        .btn-join:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px var(--primary-glow);
            filter: brightness(1.07);
        }

        .btn-join:active {
            transform: translateY(0);
            filter: brightness(0.97);
        }

        /* ── Online bar ─────────────────────────────────────── */
        .online-bar {
            display: none;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            padding: 9px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface-2);
            flex-shrink: 0;
        }

        .online-bar.show {
            display: flex;
        }

        .online-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.09em;
        }

        .chip {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10.5px;
            padding: 3px 10px;
            border-radius: 100px;
            border: 1px solid;
            animation: chipIn 0.3s ease forwards;
        }

        @keyframes chipIn {
            from {
                opacity: 0;
                transform: scale(0.85);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .chip.me {
            color: var(--primary);
            border-color: rgba(99, 91, 255, 0.3);
            background: var(--primary-bg);
        }

        .chip.other {
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.07);
        }

        /* ── Messages ───────────────────────────────────────── */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 22px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar {
            width: 3px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(99, 91, 255, 0.2);
            border-radius: 4px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 91, 255, 0.35);
        }

        .msg-in {
            animation: msgIn 0.3s cubic-bezier(0.34, 1.25, 0.64, 1) forwards;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(14px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .msg-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .msg-group.self {
            align-items: flex-end;
        }

        .msg-group.other {
            align-items: flex-start;
        }

        .msg-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 5px;
        }

        .msg-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient);
            color: white;
            flex-shrink: 0;
        }

        .msg-avatar.other-av {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .msg-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-3);
            font-family: 'JetBrains Mono', monospace;
        }

        .bubble {
            max-width: 74%;
            padding: 11px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.55;
            word-break: break-word;
            position: relative;
        }

        .bubble.self {
            background: var(--me-bg);
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 14px rgba(99, 91, 255, 0.3);
        }

        .bubble.other {
            background: var(--surface-solid);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-sm);
        }

        .bubble.history {
            opacity: 0.45;
            filter: saturate(0.6);
        }

        /* read receipt dot */
        .bubble.self::after {
            content: '✓';
            position: absolute;
            bottom: -16px;
            right: 2px;
            font-size: 10px;
            color: var(--primary);
            opacity: 0.6;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10.5px;
            color: var(--text-3);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border), transparent);
        }

        /* placeholder */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .empty-icon {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            background: var(--gradient-soft);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-2);
        }

        .empty-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-3);
        }

        /* ── Toast ──────────────────────────────────────────── */
        .toast-layer {
            position: relative;
            height: 0;
        }

        .toast {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #fff1f2, #fff5f5);
            border: 1px solid rgba(244, 63, 94, 0.25);
            color: #e11d48;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11.5px;
            padding: 8px 18px;
            border-radius: 100px;
            white-space: nowrap;
            z-index: 99;
            box-shadow: 0 4px 20px rgba(244, 63, 94, 0.15);
            animation: toastPop 3s ease forwards;
        }

        @keyframes toastPop {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(8px) scale(0.92);
            }

            12% {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }

            78% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translateX(-50%) scale(0.95);
            }
        }

        /* ── Input ──────────────────────────────────────────── */
        .input-bar {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface-solid);
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .msg-input {
            flex: 1;
            background: var(--surface-2);
            border: 1.5px solid var(--border);
            border-radius: 13px;
            padding: 11px 18px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: all 0.2s;
        }

        .msg-input::placeholder {
            color: var(--text-3);
        }

        .msg-input:focus {
            border-color: var(--primary);
            background: var(--surface-solid);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .msg-input:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 13px;
            background: var(--gradient);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.18s;
            box-shadow: 0 4px 14px var(--primary-glow);
            flex-shrink: 0;
        }

        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 22px var(--primary-glow);
            filter: brightness(1.08);
        }

        .btn-send:active:not(:disabled) {
            transform: scale(0.95);
        }

        .btn-send:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* typing indicator */
        .typing-dots {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 12px 16px;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-3);
            animation: dot 1.2s infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dot {

            0%,
            80%,
            100% {
                transform: scale(0.7);
                opacity: 0.4;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="shell">

        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="logo-wrap">
                    <div class="logo">
                        <svg width="20" height="20" fill="none" stroke="white" stroke-width="1.8" viewBox="0 0 24 24">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                        </svg>
                    </div>
                    <div class="logo-ring"></div>
                </div>
                <div>
                    <div class="app-title">Nexus Chat</div>
                    <div class="app-sub" id="room-label">Select a room to begin</div>
                </div>
            </div>
            <div class="conn-badge">
                <div class="conn-dot" id="conn-dot"></div>
                <span class="conn-text" id="conn-text">offline</span>
            </div>
        </div>

        <!-- Join Panel -->
        <div class="join-panel" id="join-panel">
            <div class="join-label">Get Started</div>
            <div class="join-row">
                <input class="field" id="username" placeholder="Your display name" />
                <input class="field field-sm" id="room" placeholder="# room" />
                <button class="btn-join" onclick="joinRoom()">Join →</button>
            </div>
        </div>

        <!-- Online Bar -->
        <div class="online-bar" id="online-bar">
            <span class="online-label">Active</span>
            <div id="online-users" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
        </div>

        <!-- Messages -->
        <ul class="messages" id="messages">
            <li class="empty-state" id="placeholder">
                <div class="empty-icon">
                    <svg width="26" height="26" fill="none" stroke="#635bff" stroke-width="1.6" viewBox="0 0 24 24">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                </div>
                <div class="empty-title">No messages yet</div>
                <div class="empty-sub">Join a room to start the conversation</div>
            </li>
        </ul>

        <!-- Toast Layer -->
        <div class="toast-layer" id="toast-layer"></div>

        <!-- Input -->
        <div class="input-bar">
            <form class="input-row" id="form">
                <input class="msg-input" id="input" autocomplete="off" placeholder="Type a message…" disabled />
                <button class="btn-send" type="submit" id="send-btn" disabled>
                    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2"
                        viewBox="0 0 24 24">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </form>
        </div>

    </div>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script>
        const socket = io("http://localhost:3000");

        let currentRoom = null;
        let currentUser = null;

        const msgList = document.getElementById("messages");
        const inputEl = document.getElementById("input");
        const sendBtn = document.getElementById("send-btn");
        const connDot = document.getElementById("conn-dot");
        const connText = document.getElementById("conn-text");
        const roomLabel = document.getElementById("room-label");
        const joinPanel = document.getElementById("join-panel");
        const onlineBar = document.getElementById("online-bar");
        const onlineUsers = document.getElementById("online-users");
        const toastLayer = document.getElementById("toast-layer");

        // ── Connection ─────────────────────────────────────────
        socket.on("connect", () => {
            connDot.classList.add("live");
            connText.textContent = "Connected";
            connText.classList.add("live");
        });
        socket.on("disconnect", () => {
            connDot.classList.remove("live");
            connText.textContent = "Offline";
            connText.classList.remove("live");
        });

        // ── Join ───────────────────────────────────────────────
        function joinRoom() {
            const user = document.getElementById("username").value.trim();
            const room = document.getElementById("room").value.trim();
            if (!user || !room) {
                const el = document.getElementById(!user ? "username" : "room");
                el.classList.add("shake");
                el.focus();
                setTimeout(() => el.classList.remove("shake"), 400);
                return;
            }
            currentUser = user;
            currentRoom = room;
            socket.emit("joinRoom", { room, user });

            roomLabel.textContent = `# ${room}`;
            roomLabel.classList.add("active");
            joinPanel.classList.add("gone");
            inputEl.disabled = false;
            sendBtn.disabled = false;
            inputEl.focus();
        }

        // ── Send ───────────────────────────────────────────────
        document.getElementById("form").addEventListener("submit", e => {
            e.preventDefault();
            if (!currentRoom || !currentUser) { showToast("Join a room first."); return; }
            const content = inputEl.value.trim();
            if (!content) return;
            socket.emit("message", { room: currentRoom, user: currentUser, content });
            inputEl.value = "";
        });

        // ── Receive ────────────────────────────────────────────
        socket.on("message", msg => addMessage(msg.sender, msg.content, msg.sender === currentUser));

        // ── History (Redis) ────────────────────────────────────
        socket.on("history", msgs => {
            if (!msgs?.length) { addDivider("no previous messages"); return; }
            addDivider(`${msgs.length} earlier message${msgs.length !== 1 ? "s" : ""}`);
            msgs.forEach(m => addMessage(m.sender, m.content, m.sender === currentUser, true));
            addDivider("new messages");
        });

        // ── Presence (Redis) ───────────────────────────────────
        socket.on("onlineUsers", users => {
            onlineBar.classList.add("show");
            onlineUsers.innerHTML = users.map(u =>
                `<span class="chip ${u === currentUser ? 'me' : 'other'}">
                ${u === currentUser ? '◆' : '●'} ${esc(u)}
            </span>`
            ).join("");
        });

        // ── Error / Rate limit ─────────────────────────────────
        socket.on("error", ({ message }) => showToast(message));

        // ── Helpers ────────────────────────────────────────────
        function addMessage(sender, content, isSelf = false, isHistory = false) {
            document.getElementById("placeholder")?.remove();
            const li = document.createElement("li");
            li.className = "msg-in";
            const initial = (isSelf ? currentUser : sender).charAt(0).toUpperCase();
            li.innerHTML = `
            <div class="msg-group ${isSelf ? 'self' : 'other'}">
                <div class="msg-meta">
                    <div class="msg-avatar ${isSelf ? '' : 'other-av'}">${initial}</div>
                    <span class="msg-name">${isSelf ? 'You' : esc(sender)}</span>
                </div>
                <div class="bubble ${isSelf ? 'self' : 'other'}${isHistory ? ' history' : ''}">${esc(content)}</div>
            </div>`;
            msgList.appendChild(li);
            msgList.scrollTop = msgList.scrollHeight;
        }

        function addDivider(text) {
            const li = document.createElement("li");
            li.className = "msg-in";
            li.innerHTML = `<div class="divider">${esc(text)}</div>`;
            msgList.appendChild(li);
            msgList.scrollTop = msgList.scrollHeight;
        }

        function showToast(text) {
            const t = document.createElement("div");
            t.className = "toast";
            t.textContent = `⚠ ${text}`;
            toastLayer.appendChild(t);
            setTimeout(() => t.remove(), 3200);
        }

        function esc(s) {
            return String(s)
                .replace(/&/g, "&amp;").replace(/</g, "&lt;")
                .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        ["username", "room"].forEach(id =>
            document.getElementById(id).addEventListener("keydown", e => { if (e.key === "Enter") joinRoom(); })
        );
    </script>
</body>

</html>
