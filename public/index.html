<!DOCTYPE html>
<html lang="en">

<head>
    <title>Nexus Chat</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link href="./css/style.css" rel="stylesheet" />
</head>

<body>
    <div class="shell">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="logo-wrap">
                    <div class="logo">
                        <svg width="20" height="20" fill="none" stroke="white" stroke-width="1.8" viewBox="0 0 24 24">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                        </svg>
                    </div>
                    <div class="logo-ring"></div>
                </div>
                <div>
                    <div class="app-title">Nexus Chat</div>
                    <div class="app-sub" id="room-label">Select a room to begin</div>
                </div>
            </div>

            <!-- right side: user info + conn badge + logout -->
            <div style="display:flex;align-items:center;gap:10px;">

                <!-- logged in user -->
                <div style="display:flex;align-items:center;gap:8px;">
                    <div id="user-avatar" style="
                    width:32px;height:32px;border-radius:10px;
                    background:var(--gradient);
                    display:flex;align-items:center;justify-content:center;
                    font-size:13px;font-weight:700;color:white;
                    box-shadow:0 3px 10px var(--primary-glow);
                    flex-shrink:0;
                "></div>
                    <div>
                        <div id="user-display"
                            style="font-size:13px;font-weight:600;color:var(--text);line-height:1.2;"></div>
                        <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-3);">online
                        </div>
                    </div>
                </div>

                <!-- divider -->
                <div style="width:1px;height:28px;background:var(--border);"></div>

                <!-- connection badge -->
                <div class="conn-badge">
                    <div class="conn-dot" id="conn-dot"></div>
                    <span class="conn-text" id="conn-text">offline</span>
                </div>

                <!-- logout button -->
                <button id="logout-btn" title="Sign out" style="
                width:34px;height:34px;border-radius:10px;
                background:rgba(244,63,94,0.08);
                border:1px solid rgba(244,63,94,0.18);
                color:#f43f5e;cursor:pointer;
                display:flex;align-items:center;justify-content:center;
                transition:all 0.18s;flex-shrink:0;
            " onmouseover="this.style.background='rgba(244,63,94,0.15)';this.style.transform='translateY(-1px)'"
                    onmouseout="this.style.background='rgba(244,63,94,0.08)';this.style.transform=''">
                    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </button>

            </div>
        </div>

        <!-- Join Panel -->
        <div class="join-panel" id="join-panel">
            <div class="join-label">Get Started</div>
            <div class="join-row">
                <input class="field" id="username" placeholder="Your display name" />
                <input class="field field-sm" id="room" placeholder="# room" />
                <button class="btn-join" onclick="joinRoom()">Join →</button>
            </div>
        </div>

        <!-- Online Bar -->
        <div class="online-bar" id="online-bar">
            <span class="online-label">Active</span>
            <div id="online-users" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
        </div>

        <!-- Messages -->
        <ul class="messages" id="messages">
            <li class="empty-state" id="placeholder">
                <div class="empty-icon">
                    <svg width="26" height="26" fill="none" stroke="#635bff" stroke-width="1.6" viewBox="0 0 24 24">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                </div>
                <div class="empty-title">No messages yet</div>
                <div class="empty-sub">Join a room to start the conversation</div>
            </li>
        </ul>

        <!-- Toast Layer -->
        <div class="toast-layer" id="toast-layer"></div>

        <!-- Input -->
        <div class="input-bar">
            <form class="input-row" id="form">
                <input class="msg-input" id="input" autocomplete="off" placeholder="Type a message…" disabled />
                <button class="btn-send" type="submit" id="send-btn" disabled>
                    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2"
                        viewBox="0 0 24 24">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </form>
        </div>

    </div>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script>
        let userData = null;
        let token = null;

        try {
            token = localStorage.getItem("token");
            userData = JSON.parse(localStorage.getItem("user") || "null");
        } catch (e) {
            console.error("Failed to parse user from localStorage:", e);
        }

        // redirect to login if no token
        if (!token || !userData) {
            window.location.href = "/login.html";
        }

        const socket = io("http://localhost:3000");

        let currentRoom = null;
        let currentUser = null;

        const displayName = userData?.username || "User";
        document.getElementById("user-display").textContent = displayName;
        document.getElementById("user-avatar").textContent = displayName.charAt(0).toUpperCase();
        document.getElementById("username").value = displayName;
        document.getElementById("username").disabled = true; // already known, lock it

        const msgList = document.getElementById("messages");
        const inputEl = document.getElementById("input");
        const sendBtn = document.getElementById("send-btn");
        const connDot = document.getElementById("conn-dot");
        const connText = document.getElementById("conn-text");
        const roomLabel = document.getElementById("room-label");
        const joinPanel = document.getElementById("join-panel");
        const onlineBar = document.getElementById("online-bar");
        const onlineUsers = document.getElementById("online-users");
        const toastLayer = document.getElementById("toast-layer");


        document.getElementById("logout-btn").addEventListener("click", () => {
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            if (socket?.connected) socket.disconnect();
            window.location.href = "/login.html";
        });


        // ── Connection ─────────────────────────────────────────
        socket.on("connect", () => {
            connDot.classList.add("live");
            connText.textContent = "Connected";
            connText.classList.add("live");
        });
        socket.on("disconnect", () => {
            connDot.classList.remove("live");
            connText.textContent = "Offline";
            connText.classList.remove("live");
        });

        // ── Join ───────────────────────────────────────────────
        function joinRoom() {
            // username is pre-filled and locked — only need room
            const user = userData.username;
            const room = document.getElementById("room").value.trim();
            if (!room) {
                const el = document.getElementById("room");
                el.classList.add("shake");
                el.focus();
                setTimeout(() => el.classList.remove("shake"), 400);
                return;
            }
            currentUser = user;
            currentRoom = room;
            socket.emit("joinRoom", { room, user });

            roomLabel.textContent = `# ${room}`;
            roomLabel.classList.add("active");
            joinPanel.classList.add("gone");
            inputEl.disabled = false;
            sendBtn.disabled = false;
            inputEl.focus();
        }

        // ── Send ───────────────────────────────────────────────
        document.getElementById("form").addEventListener("submit", e => {
            e.preventDefault();
            if (!currentRoom || !currentUser) { showToast("Join a room first."); return; }
            const content = inputEl.value.trim();
            if (!content) return;
            socket.emit("message", { room: currentRoom, user: currentUser, content });
            inputEl.value = "";
        });

        // ── Receive ────────────────────────────────────────────
        socket.on("message", msg => addMessage(msg.sender, msg.content, msg.sender === currentUser));

        // ── History (Redis) ────────────────────────────────────
        socket.on("history", msgs => {
            if (!msgs?.length) { addDivider("no previous messages"); return; }
            addDivider(`${msgs.length} earlier message${msgs.length !== 1 ? "s" : ""}`);
            msgs.forEach(m => addMessage(m.sender, m.content, m.sender === currentUser, true));
            addDivider("new messages");
        });

        // ── Presence (Redis) ───────────────────────────────────
        socket.on("onlineUsers", users => {
            onlineBar.classList.add("show");
            onlineUsers.innerHTML = users.map(u =>
                `<span class="chip ${u === currentUser ? 'me' : 'other'}">
                ${u === currentUser ? '◆' : '●'} ${esc(u)}
            </span>`
            ).join("");
        });

        // ── Error / Rate limit ─────────────────────────────────
        socket.on("error", ({ message }) => showToast(message));

        // ── Helpers ────────────────────────────────────────────
        function addMessage(sender, content, isSelf = false, isHistory = false) {
            document.getElementById("placeholder")?.remove();
            const li = document.createElement("li");
            li.className = "msg-in";
            const initial = (isSelf ? currentUser : sender).charAt(0).toUpperCase();
            li.innerHTML = `
            <div class="msg-group ${isSelf ? 'self' : 'other'}">
                <div class="msg-meta">
                    <div class="msg-avatar ${isSelf ? '' : 'other-av'}">${initial}</div>
                    <span class="msg-name">${isSelf ? 'You' : esc(sender)}</span>
                </div>
                <div class="bubble ${isSelf ? 'self' : 'other'}${isHistory ? ' history' : ''}">${esc(content)}</div>
            </div>`;
            msgList.appendChild(li);
            msgList.scrollTop = msgList.scrollHeight;
        }

        function addDivider(text) {
            const li = document.createElement("li");
            li.className = "msg-in";
            li.innerHTML = `<div class="divider">${esc(text)}</div>`;
            msgList.appendChild(li);
            msgList.scrollTop = msgList.scrollHeight;
        }

        function showToast(text) {
            const t = document.createElement("div");
            t.className = "toast";
            t.textContent = `⚠ ${text}`;
            toastLayer.appendChild(t);
            setTimeout(() => t.remove(), 3200);
        }

        function esc(s) {
            return String(s)
                .replace(/&/g, "&amp;").replace(/</g, "&lt;")
                .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        ["username", "room"].forEach(id =>
            document.getElementById(id).addEventListener("keydown", e => { if (e.key === "Enter") joinRoom(); })
        );
    </script>
</body>

</html>
