<!DOCTYPE html>
<html lang="en">

<head>
    <title>Nexus Chat — Register</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --primary: #635bff;
            --primary-dark: #4a44d1;
            --primary-glow: rgba(99, 91, 255, 0.25);
            --primary-bg: rgba(99, 91, 255, 0.07);
            --gradient: linear-gradient(135deg, #635bff 0%, #8b5cf6 50%, #d946ef 100%);
            --gradient-soft: linear-gradient(135deg, rgba(99, 91, 255, 0.10) 0%, rgba(217, 70, 239, 0.07) 100%);
            --surface: rgba(255, 255, 255, 0.88);
            --surface-solid: #ffffff;
            --surface-2: rgba(248, 248, 252, 0.95);
            --border: rgba(99, 91, 255, 0.13);
            --text: #0f0e1a;
            --text-2: #5b5675;
            --text-3: #9b96b8;
            --error: #f43f5e;
            --error-bg: rgba(244, 63, 94, 0.08);
            --success: #10b981;
            --shadow-lg: 0 8px 40px rgba(99, 91, 255, 0.16), 0 2px 8px rgba(99, 91, 255, 0.08);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-color: #eef2ff;
            background-image:
                radial-gradient(ellipse 70% 60% at 15% 85%, rgba(99, 91, 255, 0.18) 0%, transparent 55%),
                radial-gradient(ellipse 60% 50% at 85% 10%, rgba(217, 70, 239, 0.13) 0%, transparent 50%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(139, 92, 246, 0.07) 0%, transparent 60%);
            overflow: hidden;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: blobFloat 12s ease-in-out infinite alternate;
            pointer-events: none;
        }

        body::before {
            width: 500px;
            height: 500px;
            top: -100px;
            left: -100px;
            background: radial-gradient(circle, rgba(99, 91, 255, 0.15), transparent 70%);
        }

        body::after {
            width: 400px;
            height: 400px;
            bottom: -80px;
            right: -80px;
            background: radial-gradient(circle, rgba(217, 70, 239, 0.12), transparent 70%);
            animation-delay: -6s;
        }

        @keyframes blobFloat {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(30px, 20px) scale(1.05);
            }
        }

        /* ── Card ──────────────────────────────────────────── */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            background: var(--surface);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.75);
            border-radius: 24px;
            box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            overflow: hidden;
            animation: cardIn 0.5s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(28px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card-top {
            height: 5px;
            background: var(--gradient);
        }

        /* ── Header ────────────────────────────────────────── */
        .card-header {
            padding: 32px 36px 24px;
            text-align: center;
            background: var(--gradient-soft);
            border-bottom: 1px solid var(--border);
        }

        .logo-wrap {
            display: inline-flex;
            position: relative;
            margin-bottom: 16px;
        }

        .logo {
            width: 52px;
            height: 52px;
            border-radius: 15px;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px var(--primary-glow);
        }

        .logo-ring {
            position: absolute;
            inset: -4px;
            border-radius: 19px;
            border: 2px solid transparent;
            background: var(--gradient) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            opacity: 0.35;
        }

        .card-title {
            font-size: 21px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.4px;
            margin-bottom: 5px;
        }

        .card-sub {
            font-size: 13px;
            color: var(--text-3);
        }

        /* ── Body ──────────────────────────────────────────── */
        .card-body {
            padding: 26px 36px 28px;
        }

        .field-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 11.5px;
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            pointer-events: none;
            transition: color 0.2s;
        }

        .input-wrap:focus-within .input-icon {
            color: var(--primary);
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: var(--surface-2);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px 12px 42px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: all 0.2s;
        }

        input::placeholder {
            color: var(--text-3);
        }

        input:focus {
            border-color: var(--primary);
            background: var(--surface-solid);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        input.error {
            border-color: var(--error);
            box-shadow: 0 0 0 3px var(--error-bg);
        }

        input.valid {
            border-color: var(--success);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        .field-error {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--error);
            margin-top: 5px;
            padding-left: 4px;
            display: none;
        }

        .field-error.show {
            display: block;
        }

        .pw-toggle {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-3);
            padding: 4px;
            display: flex;
            transition: color 0.2s;
        }

        .pw-toggle:hover {
            color: var(--primary);
        }

        /* ── Password strength ─────────────────────────────── */
        .strength-wrap {
            margin-top: 9px;
        }

        .strength-bars {
            display: flex;
            gap: 4px;
            margin-bottom: 5px;
        }

        .strength-bar {
            flex: 1;
            height: 3px;
            border-radius: 10px;
            background: var(--border);
            transition: background 0.3s;
        }

        .strength-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10.5px;
            color: var(--text-3);
        }

        /* ── Terms ─────────────────────────────────────────── */
        .terms-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin-bottom: 18px;
            padding: 12px 14px;
            background: var(--primary-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .terms-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            min-width: 16px;
            padding: 0;
            margin-top: 1px;
            accent-color: var(--primary);
            border-radius: 4px;
            cursor: pointer;
        }

        .terms-text {
            font-size: 12.5px;
            color: var(--text-3);
            line-height: 1.5;
        }

        .terms-text a {
            color: var(--primary);
            font-weight: 500;
            text-decoration: none;
        }

        .terms-text a:hover {
            text-decoration: underline;
        }

        /* ── Alert ─────────────────────────────────────────── */
        .alert {
            border-radius: 10px;
            padding: 11px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
            animation: alertIn 0.25s ease;
        }

        @keyframes alertIn {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.show {
            display: flex;
        }

        .alert.error {
            background: var(--error-bg);
            border: 1px solid rgba(244, 63, 94, 0.2);
            color: var(--error);
        }

        .alert.success {
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        /* ── Submit ─────────────────────────────────────────── */
        .btn-submit {
            width: 100%;
            background: var(--gradient);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s;
            box-shadow: 0 4px 16px var(--primary-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--primary-glow);
            filter: brightness(1.07);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
            filter: brightness(0.97);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-submit.loading .spinner {
            display: block;
        }

        .btn-submit.loading .btn-text {
            opacity: 0.7;
        }

        /* ── Footer ─────────────────────────────────────────── */
        .card-footer {
            text-align: center;
            padding: 0 36px 28px;
        }

        .footer-text {
            font-size: 13.5px;
            color: var(--text-3);
        }

        .footer-link {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        /* ── Checklist ──────────────────────────────────────── */
        .req-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .req-item {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10.5px;
            padding: 3px 9px;
            border-radius: 100px;
            border: 1px solid var(--border);
            color: var(--text-3);
            transition: all 0.25s;
            background: var(--surface-2);
        }

        .req-item.met {
            color: var(--success);
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.07);
        }

        .req-item.met::before {
            content: '✓ ';
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="card-top"></div>

        <div class="card-header">
            <div class="logo-wrap">
                <div class="logo">
                    <svg width="24" height="24" fill="none" stroke="white" stroke-width="1.8" viewBox="0 0 24 24">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                </div>
                <div class="logo-ring"></div>
            </div>
            <div class="card-title">Create your account</div>
            <div class="card-sub">Join Nexus Chat — it's free and takes 30 seconds</div>
        </div>

        <div class="card-body">

            <div class="alert" id="alert">
                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
                <span id="alert-text"></span>
            </div>

            <form id="reg-form" novalidate>

                <!-- Username -->
                <div class="field-group">
                    <label for="username">Username</label>
                    <div class="input-wrap">
                        <input type="text" id="username" placeholder="Choose a username" autocomplete="username" />
                        <svg class="input-icon" width="16" height="16" fill="none" stroke="currentColor"
                            stroke-width="2" viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                    <div class="field-error" id="username-error"></div>
                </div>

                <!-- Password -->
                <div class="field-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" placeholder="Create a strong password"
                            autocomplete="new-password" />
                        <svg class="input-icon" width="16" height="16" fill="none" stroke="currentColor"
                            stroke-width="2" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        <button type="button" class="pw-toggle" onclick="togglePw('password', this)" tabindex="-1">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                    <!-- strength meter -->
                    <div class="strength-wrap" id="strength-wrap" style="display:none">
                        <div class="strength-bars">
                            <div class="strength-bar" id="sb1"></div>
                            <div class="strength-bar" id="sb2"></div>
                            <div class="strength-bar" id="sb3"></div>
                            <div class="strength-bar" id="sb4"></div>
                        </div>
                        <span class="strength-label" id="strength-label">Too short</span>
                    </div>
                    <!-- requirements -->
                    <div class="req-list" id="req-list">
                        <span class="req-item" id="req-len">6+ chars</span>
                        <span class="req-item" id="req-upper">uppercase</span>
                        <span class="req-item" id="req-num">number</span>
                        <span class="req-item" id="req-special">special char</span>
                    </div>
                    <div class="field-error" id="password-error"></div>
                </div>

                <!-- Confirm Password -->
                <div class="field-group">
                    <label for="confirm">Confirm Password</label>
                    <div class="input-wrap">
                        <input type="password" id="confirm" placeholder="Repeat your password"
                            autocomplete="new-password" />
                        <svg class="input-icon" width="16" height="16" fill="none" stroke="currentColor"
                            stroke-width="2" viewBox="0 0 24 24">
                            <polyline points="20 6 9 17 4 12" />
                        </svg>
                        <button type="button" class="pw-toggle" onclick="togglePw('confirm', this)" tabindex="-1">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                    <div class="field-error" id="confirm-error"></div>
                </div>

                <!-- Terms -->
                <div class="terms-row">
                    <input type="checkbox" id="terms" />
                    <label for="terms" class="terms-text"
                        style="text-transform:none;letter-spacing:0;font-size:12.5px;color:var(--text-3);margin:0;font-weight:400;">
                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">
                    <div class="spinner"></div>
                    <span class="btn-text">Create Account →</span>
                </button>
            </form>
        </div>

        <div class="card-footer">
            <p class="footer-text">
                Already have an account?
                <a href="/login.html" class="footer-link">Sign in →</a>
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById("reg-form");
        const alertEl = document.getElementById("alert");
        const alertText = document.getElementById("alert-text");
        const submitBtn = document.getElementById("submit-btn");

        // ── Password strength ─────────────────────────────────
        const bars = ["sb1", "sb2", "sb3", "sb4"].map(id => document.getElementById(id));
        const colors = ["#f43f5e", "#f97316", "#eab308", "#10b981"];
        const labels = ["Too weak", "Fair", "Good", "Strong 💪"];

        function scorePassword(pw) {
            let score = 0;
            if (pw.length >= 6) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            return score;
        }

        document.getElementById("password").addEventListener("input", function () {
            const pw = this.value;
            const strengthWrap = document.getElementById("strength-wrap");

            if (!pw) { strengthWrap.style.display = "none"; return; }
            strengthWrap.style.display = "block";

            const score = scorePassword(pw);
            bars.forEach((b, i) => {
                b.style.background = i < score ? colors[score - 1] : "var(--border)";
            });
            document.getElementById("strength-label").textContent = labels[score - 1] || "Too short";
            document.getElementById("strength-label").style.color = colors[score - 1] || "var(--text-3)";

            // requirements checklist
            toggle("req-len", pw.length >= 6);
            toggle("req-upper", /[A-Z]/.test(pw));
            toggle("req-num", /[0-9]/.test(pw));
            toggle("req-special", /[^A-Za-z0-9]/.test(pw));
        });

        function toggle(id, met) {
            document.getElementById(id).classList.toggle("met", met);
        }

        // ── Helpers ───────────────────────────────────────────
        function showAlert(msg, type = "error") {
            alertEl.className = `alert show ${type}`;
            alertText.textContent = msg;
        }
        function clearAlert() { alertEl.className = "alert"; }

        function fieldError(id, msg) {
            document.getElementById(id).classList.add("error");
            const err = document.getElementById(`${id}-error`);
            if (err) { err.textContent = msg; err.classList.add("show"); }
        }
        function clearField(id) {
            document.getElementById(id).classList.remove("error", "valid");
            const err = document.getElementById(`${id}-error`);
            if (err) err.classList.remove("show");
        }
        function setLoading(on) {
            submitBtn.disabled = on;
            submitBtn.classList.toggle("loading", on);
        }
        function togglePw(id, btn) {
            const input = document.getElementById(id);
            const isText = input.type === "text";
            input.type = isText ? "password" : "text";
            btn.style.color = isText ? "" : "var(--primary)";
        }

        // ── Submit ────────────────────────────────────────────
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            clearAlert();
            ["username", "password", "confirm"].forEach(clearField);

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const confirm = document.getElementById("confirm").value;
            const terms = document.getElementById("terms").checked;

            let valid = true;

            if (!username) { fieldError("username", "Username is required."); valid = false; }
            else if (username.length < 3) { fieldError("username", "At least 3 characters."); valid = false; }

            if (!password) { fieldError("password", "Password is required."); valid = false; }
            else if (password.length < 6) { fieldError("password", "At least 6 characters."); valid = false; }

            if (!confirm) { fieldError("confirm", "Please confirm your password."); valid = false; }
            else if (password !== confirm) { fieldError("confirm", "Passwords do not match."); valid = false; }

            if (!terms) { showAlert("You must agree to the Terms of Service to continue."); valid = false; }

            if (!valid) return;

            setLoading(true);
            try {
                const res = await fetch("/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();

                if (!res.ok) {
                    showAlert(data.message || "Registration failed.");
                    return;
                }

                showAlert("Account created! Redirecting to login…", "success");
                setTimeout(() => window.location.href = "/login.html", 1200);

            } catch (err) {
                showAlert("Network error. Please try again.");
            } finally {
                setLoading(false);
            }
        });

        ["username", "password", "confirm"].forEach(id => {
            document.getElementById(id).addEventListener("input", () => clearField(id));
        });
    </script>
</body>

</html>
